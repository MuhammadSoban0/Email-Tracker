<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Email Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Email Tracker">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-building"></i> Company Email Tracker</h1>
            <div class="header-stats">
                <div class="stat">
                    <span class="stat-number" id="totalCompanies">0</span>
                    <span class="stat-label">Companies</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="totalEmails">0</span>
                    <span class="stat-label">Emails Sent</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="pendingEmails">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Add Company Section -->
            <section class="add-company-section">
                <div class="section-header">
                    <h2><i class="fas fa-plus-circle"></i> Add New Company</h2>
                    <button class="btn btn-primary" id="toggleAddForm">
                        <i class="fas fa-plus"></i> Add Company
                    </button>
                </div>
                
                <div class="add-company-form" id="addCompanyForm" style="display: none;">
                    <form id="companyForm">
                        <div class="form-group">
                            <label for="companyName">Company Name</label>
                            <input type="text" id="companyName" required placeholder="Enter company name">
                        </div>
                        
                        <div class="form-group">
                            <label>Email Addresses</label>
                            <div class="email-inputs" id="emailInputs">
                                <div class="email-input-group">
                                    <input type="email" class="email-input" placeholder="Enter email address" required>
                                    <button type="button" class="btn-remove-email" onclick="removeEmailInput(this)">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-secondary" id="addEmailBtn">
                                <i class="fas fa-plus"></i> Add Another Email
                            </button>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Company
                            </button>
                            <button type="button" class="btn btn-secondary" id="cancelForm">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Companies List -->
            <section class="companies-section">
                <div class="section-header">
                    <h2><i class="fas fa-building"></i> Companies</h2>
                    <div class="search-box">
                        <input type="text" id="searchCompanies" placeholder="Search companies...">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
                
                <div class="companies-grid" id="companiesGrid">
                    <!-- Companies will be dynamically loaded here -->
                </div>
            </section>

            <!-- Email Tracker Section -->
            <section class="email-tracker-section">
                <div class="section-header">
                    <h2><i class="fas fa-envelope"></i> Email Tracker</h2>
                    <div class="filter-buttons">
                        <button class="btn btn-filter active" data-filter="all">All</button>
                        <button class="btn btn-filter" data-filter="pending">Pending</button>
                        <button class="btn btn-filter" data-filter="sent">Sent</button>
                    </div>
                </div>
                
                <div class="email-tracker-list" id="emailTrackerList">
                    <!-- Email tracking items will be dynamically loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Send Email Modal -->
    <div class="modal" id="sendEmailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> Send Email</h3>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="sendEmailForm">
                    <input type="hidden" id="selectedCompanyId">
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="selectedCompanyName" readonly>
                    </div>
                    <div class="form-group">
                        <label>Select Email(s)</label>
                        <div id="emailCheckboxes" class="email-checkboxes">
                            <!-- Email checkboxes will be populated here -->
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="emailSubject">Subject</label>
                        <input type="text" id="emailSubject" required placeholder="Enter email subject">
                    </div>
                    <div class="form-group">
                        <label for="emailMessage">Message</label>
                        <textarea id="emailMessage" rows="4" placeholder="Enter your message"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Send Email
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelSendEmail">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
